{% extends "layout.html" %}
{% block content %}
    <h2>Add Task</h2>
    <form method="POST">
        <div class="mb-3">
            <label>Task Name</label>
            <input 
                type="text" 
                class="form-control" 
                name="task_name"
                required
            >
        </div>
        <div class="mb-3">
            <label>Task Description</label>
            <textarea 
                class="form-control" 
                name="task_description" 
            ></textarea>
        </div>
        <div class="mb-3">
            <label>Maximum Marks</label>
            <input 
                type="number" 
                class="form-control" 
                name="maximum_marks"
                required
            >
        </div>
        
        <button 
        type="submit"
        class="btn btn-primary">Save Task</button>
    </form>
{% endblock %}
